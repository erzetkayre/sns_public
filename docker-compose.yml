version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: sns-postgres-ai
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_snsanalytical
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: ./backend
    container_name: sns-backend-ai
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/db_snsanalytical
    depends_on:
      - postgres
    volumes:
    - ./backend:/app
    - /app/node_modules
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: sns-pgadmin-ai
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
    - postgres

  # frontend:
  #   build: ./frontend
  #   container_name: sns-frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
